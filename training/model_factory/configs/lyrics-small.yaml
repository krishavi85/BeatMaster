model:
  text_vocab_size: 16000
  text_max_length: 1024
  transformer_dim: 512
  transformer_heads: 8
  transformer_layers: 8
  transformer_ff: 2048
  dropout: 0.1
data:
  index: data/prepared/segments.jsonl
  tokenizer: data/tokenizer.json
training:
  output_dir: runs/lyrics-small
  device: auto
  batch_size: 4
  epochs: 30
  learning_rate: 0.0003
