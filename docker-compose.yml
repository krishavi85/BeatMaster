services:
  api:
    build: ./backend
    environment:
      BEATMASTER_DATA_DIR: /data
      DATABASE_URL: sqlite:////data/beatmaster.db
      ENABLE_LOCAL_MUSICGEN: "false"
    volumes:
      - beatmaster_data:/data
    ports:
      - "8000:8000"
      - "8080:8000"
    restart: unless-stopped
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      BEATMASTER_DATA_DIR: /data
      DATABASE_URL: sqlite:////data/beatmaster.db
      DEMUCS_DEVICE: cpu
      ENABLE_LOCAL_MUSICGEN: "false"
    volumes:
      - beatmaster_data:/data
      - model_cache:/root/.cache
    depends_on:
      - api
    restart: unless-stopped
volumes:
  beatmaster_data:
  model_cache:
