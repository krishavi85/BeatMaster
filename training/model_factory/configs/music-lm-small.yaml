model:
  sample_rate: 32000
  audio_channels: 1
  codec_hidden: 64
  codec_latent: 128
  codec_codebooks: 4
  codec_bins: 1024
  codec_strides: [2, 4, 5, 8]
  text_vocab_size: 16000
  text_max_length: 256
  transformer_dim: 512
  transformer_heads: 8
  transformer_layers: 8
  transformer_ff: 2048
  dropout: 0.1
  max_audio_frames: 4096
  n_mels: 100
  singing_hidden: 384
  singing_layers: 6
  singing_heads: 6
  vocoder_upsample: [8, 8, 5]
data:
  index: data/tokens/tokens.jsonl
  tokenizer: data/tokenizer.json
training:
  output_dir: runs/music-lm-small
  device: auto
  batch_size: 2
  workers: 2
  epochs: 50
  learning_rate: 0.0003
  weight_decay: 0.01
  warmup_steps: 1000
  gradient_clip: 1.0
