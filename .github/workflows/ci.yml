name: BeatMaster CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install system audio tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libsndfile1
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r backend/requirements.txt pytest
      - name: Compile backend
        working-directory: backend
        run: python -m compileall -q app tests
      - name: Run test suite
        working-directory: backend
        env:
          BEATMASTER_DATA_DIR: /tmp/beatmaster-data
          DATABASE_URL: sqlite:////tmp/beatmaster-data/test.db
          ENABLE_LOCAL_MUSICGEN: "false"
          CULTURE_MODEL_MAP: ""
          LYRICS_PROVIDER: ""
          SINGING_PROVIDER: ""
        run: pytest -q
      - name: Import application and test health
        working-directory: backend
        env:
          BEATMASTER_DATA_DIR: /tmp/beatmaster-data
          DATABASE_URL: sqlite:////tmp/beatmaster-data/test.db
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from app.server import application
          client = TestClient(application)
          response = client.get('/health')
          assert response.status_code == 200, response.text
          assert response.json()['status'] == 'ok'
          capabilities = client.get('/api/capabilities')
          assert capabilities.status_code == 200, capabilities.text
          profiles = client.get('/api/culture-profiles')
          assert profiles.status_code == 200, profiles.text
          assert len(profiles.json()['profiles']) >= 9
          print(capabilities.json())
          PY
      - name: Validate Compose configuration
        run: docker compose config
