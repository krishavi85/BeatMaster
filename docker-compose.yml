services:
  api:
    build: ./backend
    environment:
      BEATMASTER_DATA_DIR: /data
      DATABASE_URL: sqlite:////data/beatmaster.db
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-2147483648}
      ENABLE_LOCAL_MUSICGEN: ${ENABLE_LOCAL_MUSICGEN:-false}
      MUSICGEN_MODEL: ${MUSICGEN_MODEL:-}
      MUSICGEN_DEVICE: ${MUSICGEN_DEVICE:-cpu}
      CULTURE_MODEL_MAP: ${CULTURE_MODEL_MAP:-{}}
      LYRICS_PROVIDER: ${LYRICS_PROVIDER:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_LYRICS_MODEL: ${OLLAMA_LYRICS_MODEL:-}
      LYRICS_API_URL: ${LYRICS_API_URL:-}
      LYRICS_API_KEY: ${LYRICS_API_KEY:-}
      LYRICS_MODEL: ${LYRICS_MODEL:-}
      LYRICS_LOCAL_MODEL: ${LYRICS_LOCAL_MODEL:-}
    volumes:
      - beatmaster_data:/data
    ports:
      - "8000:8000"
      - "8080:8000"
    restart: unless-stopped
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      BEATMASTER_DATA_DIR: /data
      DATABASE_URL: sqlite:////data/beatmaster.db
      DEMUCS_DEVICE: ${DEMUCS_DEVICE:-cpu}
      ENABLE_LOCAL_MUSICGEN: ${ENABLE_LOCAL_MUSICGEN:-false}
      MUSICGEN_MODEL: ${MUSICGEN_MODEL:-}
      MUSICGEN_DEVICE: ${MUSICGEN_DEVICE:-cpu}
      CULTURE_MODEL_MAP: ${CULTURE_MODEL_MAP:-{}}
      LYRICS_PROVIDER: ${LYRICS_PROVIDER:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_LYRICS_MODEL: ${OLLAMA_LYRICS_MODEL:-}
      LYRICS_API_URL: ${LYRICS_API_URL:-}
      LYRICS_API_KEY: ${LYRICS_API_KEY:-}
      LYRICS_MODEL: ${LYRICS_MODEL:-}
      LYRICS_LOCAL_MODEL: ${LYRICS_LOCAL_MODEL:-}
    volumes:
      - beatmaster_data:/data
      - model_cache:/root/.cache
    depends_on:
      - api
    restart: unless-stopped
volumes:
  beatmaster_data:
  model_cache:
