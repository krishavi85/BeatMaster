services:
  api:
    build: ./backend
    environment:
      BEATMASTER_DATA_DIR: /data
      DATABASE_URL: sqlite:////data/beatmaster.db
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    volumes:
      - beatmaster_data:/data
    ports:
      - "8000:8000"
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      BEATMASTER_DATA_DIR: /data
      DATABASE_URL: sqlite:////data/beatmaster.db
      DEMUCS_DEVICE: cpu
    volumes:
      - beatmaster_data:/data
      - model_cache:/root/.cache
    depends_on:
      - api
  web:
    build: ./web
    ports:
      - "8080:80"
    depends_on:
      - api
volumes:
  beatmaster_data:
  model_cache:
